version: '3.8'

services:
  mysql-db:
    image: mysql:8.0
    environment:
      - MYSQL_DATABASE=${DB_NAME}
      - MYSQL_ROOT_PASSWORD=${DB_PASSWORD}
    volumes:
      - r2sshop_storage:/var/lib/mysql
  app:
    build: .
    environment:
      - SPRING_PROFILES_ACTIVE=${ACTIVE_PROFILE}
      - SPRING_DATASOURCE_USERNAME=${DB_USER}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
    depends_on:
      - mysql-db
volumes:
  r2sshop_storage: